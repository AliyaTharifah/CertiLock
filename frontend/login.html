<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CertiLock</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <i class="fa-solid fa-shield-halved"></i> <span>CertiLock</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="verify.html">Verify</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="glass-card">
            <h2 class="text-center">Admin Login</h2>
            <p class="text-center">Masuk untuk menerbitkan sertifikat yang aman.</p>
            
            <div id="loginAlert" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" required placeholder="Masukkan username admin">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="Masukkan password">
                </div>
                <button type="submit" class="btn" id="loginBtn">
                    <span class="loader" id="loginLoader"></span>
                    Login
                </button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 CertiLock Project - Sistem Multimedia</p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
