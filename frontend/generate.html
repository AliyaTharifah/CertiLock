<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Certificate - CertiLock</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        if (!localStorage.getItem('adminId')) {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <nav>
        <a href="dashboard.html" class="logo">
            <i class="fa-solid fa-shield-halved"></i> <span>CertiLock</span>
        </a>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="generate.html" class="active">Generate</a></li>
            <li><a href="#" id="logoutBtn" class="btn-login" style="border-color: var(--danger-color); color: var(--danger-color);">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="glass-card large">
            <h2 class="text-center">Generate Secure Certificate</h2>
            <p class="text-center">Amankan sertifikat Anda dengan menyisipkan data verifikasi ke dalam gambar secara tersembunyi.</p>
            
            <div id="genAlert" class="alert"></div>

            <form id="generateForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div>
                        <div class="form-group">
                            <label for="certNumber">Nomor Sertifikat</label>
                            <input type="text" id="certNumber" class="form-control" required placeholder="CERT-2026-001">
                        </div>
                        <div class="form-group">
                            <label for="ownerName">Nama Pemilik</label>
                            <input type="text" id="ownerName" class="form-control" required placeholder="Nama Lengkap">
                        </div>
                        <div class="form-group">
                            <label for="eventName">Nama Acara / Pelatihan</label>
                            <input type="text" id="eventName" class="form-control" required placeholder="Seminar Keamanan Siber">
                        </div>
                        <div class="form-group">
                            <label for="issueDate">Tanggal Terbit</label>
                            <input type="date" id="issueDate" class="form-control" required>
                        </div>
                    </div>
                    <div>
                        <div class="form-group file-upload" id="dropZone" style="height: 100%; justify-content: center;">
                            <i class="fa-solid fa-image"></i>
                            <p>Upload File Gambar (PNG/JPG)</p>
                            <input type="file" id="certificateImage" accept="image/png, image/jpeg" required>
                            <span id="fileName" style="color: var(--primary-color); margin-top: 10px;"></span>
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 1.5rem; text-align: center;">
                    <button type="submit" class="btn" id="generateBtn" style="max-width: 300px;">
                        <span class="loader" id="genLoader"></span>
                        Generate & Download
                    </button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 CertiLock Project - Sistem Multimedia</p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
